# Render Blueprint — https://docs.render.com/blueprint-spec
# Eleventy: `npm run build` (README) → output `_site` (.eleventy.js). CI uses `npm ci` with package-lock.json.

services:
  - type: web
    name: rhoderash
    runtime: static
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    staticPublishPath: ./_site
    envVars:
      - key: NODE_VERSION
        value: "20"
